<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>(1) Instagram</title>
<style>
body { margin:0; font-family:-apple-system; background:#fff; color:#333; }
.header { display:flex; align-items:center; padding:10px; border-bottom:1px solid #eee; background:#FFC8D9; }
.header img { width:36px; height:36px; border-radius:50%; margin-right:10px; }
.name { font-weight:600; font-size:15px; flex:1; }
.sub { font-size:12px; color:#888; }
.addTaskIcon { width:28px; height:28px; cursor:pointer; }

#taskArea { padding:10px; }
.chat { padding:10px; margin-bottom:70px; display:flex; flex-direction:column; }
.row { display:flex; align-items:flex-end; margin:6px 0; }
.msg { max-width:65%; padding:10px 14px; border-radius:18px; font-size:14px; }
.me { margin-left:auto; background:linear-gradient(135deg,#FFC8D9,#FFA6C0); color:white; }
.ai { background:#f1f1f1; }
.pfp { width:26px; height:26px; border-radius:50%; margin-right:6px; }
.read { font-size:11px; color:#999; margin:2px 10px; text-align:right; }

.inputArea { position:fixed; bottom:0; width:100%; display:flex; padding:8px; border-top:1px solid #eee; background:white; }
input#msgInput { flex:1; padding:10px; border-radius:20px; border:1px solid #ddd; }
button, .sendBtn { margin-left:6px; cursor:pointer; border:none; border-radius:20px; background:#FFC8D9; color:white; width:48px; height:48px; object-fit:contain; }

.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,200,217,0.95); overflow:auto; padding:20px; box-sizing:border-box; }
.modalHeader { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.modalHeader h1 { font-size:2em; font-weight:bold; }
.closeModal { cursor:pointer; font-size:1.5em; font-weight:bold; }
.addSectionBtn { display:inline-block; padding:6px 12px; border:2px solid #FFC8D9; border-radius:12px; cursor:pointer; margin-bottom:20px; }

.section { border:1px solid #FFC8D9; border-radius:12px; padding:12px; margin-bottom:16px; background:#fff; }
.sectionDate { font-weight:bold; margin-bottom:4px; }
.separator { height:2px; background:#FFC8D9; margin:4px 0; }

.videoTask, .conceptTask { margin:8px 0; padding:6px; border-radius:8px; border:1px solid #FFC8D9; background:#fff; }
.videoTitle { font-weight:bold; }
.videoLength { font-size:12px; color:#FFB0C2; margin:2px 0; }
.progressContainer { height:8px; border:1px solid #FFC8D9; border-radius:4px; background:#fff; margin-top:4px; }
.progressBar { height:100%; width:0%; background:#FFC8D9; border-radius:4px; }
.heartBtn { cursor:pointer; font-size:18px; color:#FFC8D9; margin-left:6px; }
</style>
</head>
<body>

<div class="header">
  <img src="pfp.jpg">
  <div class="name">김현준</div>
  <div class="addTaskIcon" onclick="openModal()">🩷</div>
</div>

<div id="chat" class="chat"></div>

<div class="inputArea">
  <input id="msgInput" placeholder="메시지 보내기...">
  <img src="send.png" class="sendBtn" onclick="sendMsg()">
</div>

<div id="taskModal" class="modal">
  <div class="modalHeader">
    <h1>디데이: 2026-11-19</h1>
    <div class="closeModal" onclick="closeModal()">✖</div>
  </div>
  <div class="addSectionBtn" onclick="addSection()">할 일 추가</div>
  <div id="sectionsContainer"></div>
</div>

<script>
let chat = document.getElementById("chat");
let sectionsContainer = document.getElementById("sectionsContainer");
let sections = [];
let sentMsgs = new Set();
let studyMsgs = ["넌 공부 안하냐","공부좀해","너 공부안하면 연락안함","ㅗ","연락 ㄴ","왜 아직 안했냐","좀 하자","공부 잘해서 나 먹여살린다매","너 고3아니냐","나한테 이러면서 공부도 안하는건 쫌 한심하네","공부 왜안함","니 인생 걍 놧냐"];

function openModal(){ document.getElementById("taskModal").style.display="block"; }
function closeModal(){ document.getElementById("taskModal").style.display="none"; }

function addSection(){
  const section = {date:"2026-11-19", videos:[], concepts:[]};
  sections.push(section);
  renderSections();
}

function renderSections(){
  sectionsContainer.innerHTML="";
  sections.forEach((s,i)=>{
    const secDiv = document.createElement("div");
    secDiv.className="section";

    const dateDiv = document.createElement("div");
    dateDiv.className="sectionDate";
    dateDiv.innerText=s.date;
    secDiv.appendChild(dateDiv);

    const separator = document.createElement("div");
    separator.className="separator";
    secDiv.appendChild(separator);

    // 영상 섹터
    const videoDiv = document.createElement("div");
    videoDiv.className="videoTask";
    const videoTitleInput = document.createElement("input");
    videoTitleInput.placeholder="영상 제목";
    videoDiv.appendChild(videoTitleInput);

    const timeContainer = document.createElement("div");
    timeContainer.style.display="flex"; timeContainer.style.alignItems="center"; timeContainer.style.marginTop="4px";

    const hourInput = document.createElement("input"); hourInput.type="number"; hourInput.min=0; hourInput.placeholder="시간"; hourInput.style.width="40px";
    const minInput = document.createElement("input"); minInput.type="number"; minInput.min=0; minInput.placeholder="분"; minInput.style.width="40px";
    const secInput = document.createElement("input"); secInput.type="number"; secInput.min=0; secInput.placeholder="초"; secInput.style.width="40px";

    timeContainer.appendChild(hourInput);
    timeContainer.appendChild(minInput);
    timeContainer.appendChild(secInput);
    videoDiv.appendChild(timeContainer);

    // 진행률
    const progressContainer = document.createElement("div"); progressContainer.className="progressContainer";
    const progressBar = document.createElement("div"); progressBar.className="progressBar";
    progressContainer.appendChild(progressBar);
    videoDiv.appendChild(progressContainer);

    const heart = document.createElement("span"); heart.className="heartBtn"; heart.innerText="♡";
    heart.onclick=()=>{
      progressBar.style.width="100%";
      heart.innerText="♥";
    }
    videoDiv.appendChild(heart);
    secDiv.appendChild(videoDiv);

    // 개념정리 섹터
    const conceptDiv = document.createElement("div"); conceptDiv.className="conceptTask";
    const conceptInput = document.createElement("input"); conceptInput.placeholder="개념 정리";
    const conceptCheck = document.createElement("input"); conceptCheck.type="checkbox"; conceptCheck.style.marginLeft="6px";
    conceptDiv.appendChild(conceptInput); conceptDiv.appendChild(conceptCheck);

    secDiv.appendChild(conceptDiv);

    sectionsContainer.appendChild(secDiv);

    // 시간 입력 시 1시간 미만이면 시간칸 숨김
    function updateTimeDisplay(){
      const h = parseInt(hourInput.value)||0;
      if(h===0) hourInput.style.display="none"; else hourInput.style.display="inline-block";
    }
    hourInput.oninput = updateTimeDisplay;
  });
}

// 채팅
function timeAgo(ts){
  let diff = Math.floor((Date.now()-ts)/60000);
  if(diff<1) return "방금 전";
  if(diff<60) return diff+"분 전";
  let h=Math.floor(diff/60);
  return h+"시간 전";
}
function load(){
  let data = JSON.parse(localStorage.getItem("chat")||"[]");
  chat.innerHTML="";
  let lastMeIndex = [...data].map(m=>m.type).lastIndexOf("me");

  data.forEach((m,i)=>{
    let row=document.createElement("div"); row.className="row";
    if(m.type==="ai"){ let img=document.createElement("img"); img.src="pfp.jpg"; img.className="pfp"; row.appendChild(img);}
    let msg=document.createElement("div"); msg.className="msg "+m.type; msg.innerText=m.text; row.appendChild(msg); chat.appendChild(row);
    if(i === lastMeIndex){ let r=document.createElement("div"); r.className="read"; r.innerText="읽음 · "+timeAgo(m.time); chat.appendChild(r);}
  });
  chat.scrollTop=chat.scrollHeight;
}

function sendMsg(){
  let input = document.getElementById("msgInput"); let text = input.value.trim();
  if(!text) return; save(text,"me"); input.value="";
  setTimeout(()=>{
    if(document.getElementById("msgInput").value.trim()==="") aiReply(text);
  },1500);
}
function save(text,type){
  let data = JSON.parse(localStorage.getItem("chat")||"[]");
  data.push({text,type,time:Date.now()});
  localStorage.setItem("chat",JSON.stringify(data)); load();
}
function aiReply(userMsg){ let base=["ㅅ","ㅎㅅ","왜ㅅ"]; let msg=base[Math.floor(Math.random()*base.length)]; save(msg,"ai"); }

setInterval(()=>{
  const available = studyMsgs.filter(m=>!sentMsgs.has(m));
  if(available.length===0) sentMsgs.clear();
  const msg = available[Math.floor(Math.random()*available.length)];
  sentMsgs.add(msg); save(msg,"ai");
}, 1000*60*5);

document.addEventListener("DOMContentLoaded",()=>{ load(); });
</script>
</body>
</html>
