<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DM + Planner</title>

<style>
body { margin:0; font-family:-apple-system; background:#fff; }

/* 헤더 */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  border-bottom:1px solid #FFCBD9;
}

.name { font-weight:600; }
.plus { font-size:22px; color:#FFCBD9; cursor:pointer; }

/* 화면 */
.screen { display:none; }
.active { display:block; }

/* 채팅 */
#chat {
  height:calc(100vh - 110px);
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.row { display:flex; margin:4px 0; }
.row.me { justify-content:flex-end; }
.row.ai { justify-content:flex-start; }

.bubble {
  max-width:65%;
  padding:10px 14px;
  border-radius:18px;
  font-size:14px;
}

.me .bubble {
  background:linear-gradient(135deg,#FFCBD9,#FF97B3);
  color:#fff;
}

.ai .bubble {
  background:#f1f1f1;
}

.read {
  font-size:11px;
  color:#999;
  margin-top:2px;
  text-align:right;
}

/* 입력 */
.inputArea {
  display:flex;
  padding:8px;
  border-top:1px solid #eee;
}

#msgInput {
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #ddd;
}

.sendBtn {
  margin-left:6px;
  padding:0 14px;
  border:none;
  border-radius:20px;
  background:#FFCBD9;
  color:#fff;
  cursor:pointer;
}

/* 플래너 */
#plannerContent { padding:20px; }

#dDay {
  font-size:32px;
  font-weight:700;
  margin-bottom:20px;
}

.addTaskBtn {
  border:2px solid #FFCBD9;
  padding:10px;
  border-radius:12px;
  color:#FFCBD9;
  background:#fff;
  cursor:pointer;
}

.taskBox {
  border:2px solid #FFCBD9;
  border-radius:16px;
  padding:12px;
  margin-top:12px;
}

.taskDate {
  font-weight:700;
  margin-bottom:6px;
}

.line {
  height:1px;
  background:#ccc;
  margin-bottom:8px;
}

/* 섹터 */
.sector {
  border:1px solid #FFCBD9;
  border-radius:12px;
  padding:8px;
  margin-top:8px;
}

.progressBar {
  width:100%;
  height:8px;
  border:1px solid #FFCBD9;
  border-radius:4px;
  margin-top:4px;
}

.progressFill {
  height:100%;
  width:0%;
  background:#FFCBD9;
}

.heart {
  cursor:pointer;
  color:#FFCBD9;
  font-size:18px;
}
</style>
</head>

<body>

<!-- DM -->
<div id="dmScreen" class="screen active">
  <div class="header">
    <div class="name">김현준</div>
    <div class="plus" id="goPlanner">＋</div>
  </div>

  <div id="chat"></div>

  <div class="inputArea">
    <input id="msgInput">
    <button class="sendBtn">전송</button>
  </div>
</div>

<!-- 플래너 -->
<div id="plannerScreen" class="screen">
  <div class="header">
    <div id="backBtn">&lt;</div>
    <div>플래너</div>
    <div></div>
  </div>

  <div id="plannerContent">
    <div id="dDay"></div>
    <button class="addTaskBtn">할 일 추가</button>
    <div id="taskContainer"></div>
  </div>
</div>

<script>

/* 화면 전환 */
const dmScreen = document.getElementById('dmScreen');
const plannerScreen = document.getElementById('plannerScreen');

document.getElementById('goPlanner').onclick = ()=>{
  dmScreen.classList.remove('active');
  plannerScreen.classList.add('active');
  updateDDay();
};

document.getElementById('backBtn').onclick = ()=>{
  plannerScreen.classList.remove('active');
  dmScreen.classList.add('active');
};

/* DDAY */
function updateDDay(){
  const target = new Date(2026,10,19);
  const now = new Date();
  const diff = Math.ceil((target-now)/(1000*60*60*24));
  document.getElementById('dDay').innerText = "D-" + diff;
}

/* ===== 채팅 ===== */
const chatEl = document.getElementById('chat');
const input = document.getElementById('msgInput');
const sendBtn = document.querySelector('.sendBtn');

let chatData = JSON.parse(localStorage.getItem('chat')||'[]');
let isTyping = false;

function renderChat(){
  chatEl.innerHTML='';
  let lastMeIndex = chatData.map(m=>m.type).lastIndexOf('me');

  chatData.forEach((m,i)=>{
    let row = document.createElement('div');
    row.className = 'row ' + m.type;

    let wrap = document.createElement('div');

    let bubble = document.createElement('div');
    bubble.className='bubble';
    bubble.innerText=m.text;

    wrap.appendChild(bubble);

    if(m.type==='me' && i===lastMeIndex){
      let nextAI = chatData.slice(i+1).find(x=>x.type==='ai');
      if(nextAI && !isTyping){
        let read = document.createElement('div');
        read.className='read';
        read.innerText='읽음';
        wrap.appendChild(read);
      }
    }

    row.appendChild(wrap);
    chatEl.appendChild(row);
  });

  if(isTyping){
    let row = document.createElement('div');
    row.className='row ai';
    let bubble = document.createElement('div');
    bubble.className='bubble';
    bubble.innerText='...';
    row.appendChild(bubble);
    chatEl.appendChild(row);
  }

  chatEl.scrollTop = chatEl.scrollHeight;
}

function save(msg,type){
  chatData.push({text:msg,type:type,time:Date.now()});
  localStorage.setItem('chat',JSON.stringify(chatData));
  renderChat();
}

function generateReply(){
  const arr=['ㅇㅇ','ㅋㅋ','왜','뭐임'];
  return arr[Math.floor(Math.random()*arr.length)];
}

function replyFlow(msg){
  setTimeout(()=>{
    isTyping=true;
    renderChat();

    setTimeout(()=>{
      isTyping=false;
      save(generateReply(msg),'ai');
    },5000);

  }, Math.random()*600000+60000);
}

function sendMsg(){
  let text=input.value.trim();
  if(!text) return;
  save(text,'me');
  input.value='';
  replyFlow(text);
}

sendBtn.onclick = sendMsg;

/* ===== 플래너 ===== */
function addSector(btn){
  const container = btn.nextElementSibling;

  // 이미 열려있으면 중복 방지
  if(container.querySelector('.menu')) return;

  const menu = document.createElement('div');
  menu.className = 'menu';

  const list = [
    {name:'영상 시청', type:'video'},
    {name:'개념 정리', type:'concept'},
    {name:'문풀', type:'problem'}
  ];

  list.forEach(item=>{
    const b = document.createElement('button');
    b.innerText = item.name;

    b.onclick = ()=>{
      const sec = document.createElement('div');
      sec.className='sector';

      // ===== 영상 =====
      if(item.type==='video'){
        sec.innerHTML = `
          <div style="font-weight:700;">영상 시청</div>

          <div style="font-size:12px;color:#FFCBD9;">총 길이</div>
          <input class="t_h" type="number" placeholder="시">
          <input class="t_m" type="number" placeholder="분">
          <input class="t_s" type="number" placeholder="초">

          <br>

          <div style="font-size:12px;color:#FFCBD9;">현재 시청</div>
          <input class="c_h" type="number" placeholder="시">
          <input class="c_m" type="number" placeholder="분">
          <input class="c_s" type="number" placeholder="초">

          <div style="height:8px;border:1px solid #FFCBD9;margin-top:5px;">
            <div class="bar" style="height:100%;width:0%;background:#FFCBD9;"></div>
          </div>

          <span class="heart">♡</span>
        `;

        const t_h = sec.querySelector('.t_h');
        const t_m = sec.querySelector('.t_m');
        const t_s = sec.querySelector('.t_s');

        const c_h = sec.querySelector('.c_h');
        const c_m = sec.querySelector('.c_m');
        const c_s = sec.querySelector('.c_s');

        const bar = sec.querySelector('.bar');
        const heart = sec.querySelector('.heart');

        function update(){
          const total =
            (Number(t_h.value)||0)*3600 +
            (Number(t_m.value)||0)*60 +
            (Number(t_s.value)||0);

          const current =
            (Number(c_h.value)||0)*3600 +
            (Number(c_m.value)||0)*60 +
            (Number(c_s.value)||0);

          if(total>0){
            let percent = Math.min(100, (current/total)*100);
            bar.style.width = percent + '%';

            if(percent===100){
              heart.innerText='♥';
            }
          }
        }

        [t_h,t_m,t_s,c_h,c_m,c_s].forEach(i=>{
          i.addEventListener('input', update);
        });
      }

      // ===== 개념 =====
      if(item.type==='concept'){
        sec.innerHTML = `
          <input type="text" placeholder="개념 입력">
          <input type="checkbox">
        `;
      }

      // ===== 문풀 =====
      if(item.type==='problem'){
        sec.innerHTML = `
          <input type="text" placeholder="문제집 이름">
          <br>
          <input type="text" placeholder="범위">
          <span class="heart">♡</span>
        `;

        const heart = sec.querySelector('.heart');
        heart.onclick = ()=>{
          heart.innerText = heart.innerText==='♡' ? '♥' : '♡';
        };
      }

      container.appendChild(sec);
      menu.remove();
    };

    menu.appendChild(b);
  });

  container.appendChild(menu);
}

/* 시작 */
renderChat();

</script>

</body>
</html>
