<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DM + Planner</title>

<style>
body { margin:0; font-family:-apple-system; background:#fff; }

/* 헤더 */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  border-bottom:1px solid #FFCBD9;
}

.name { font-weight:600; }
.plus { font-size:22px; color:#FFCBD9; cursor:pointer; }

/* 화면 */
.screen { display:none; }
.active { display:block; }

/* 채팅 */
#chat {
  height:calc(100vh - 110px);
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.row { display:flex; margin:4px 0; }
.row.me { justify-content:flex-end; }
.row.ai { justify-content:flex-start; }

.bubble {
  max-width:65%;
  padding:10px 14px;
  border-radius:18px;
  font-size:14px;
}

.me .bubble {
  background:linear-gradient(135deg,#FFCBD9,#FF97B3);
  color:#fff;
}

.ai .bubble {
  background:#f1f1f1;
}

.read {
  font-size:11px;
  color:#999;
  margin-top:2px;
  text-align:right;
}

/* 입력 */
.inputArea {
  display:flex;
  padding:8px;
  border-top:1px solid #eee;
}

#msgInput {
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #ddd;
}

.sendBtn {
  margin-left:6px;
  padding:0 14px;
  border:none;
  border-radius:20px;
  background:#FFCBD9;
  color:#fff;
  cursor:pointer;
}

/* 플래너 */
#plannerContent { padding:20px; }

#dDay {
  font-size:32px;
  font-weight:700;
  margin-bottom:20px;
}

.addTaskBtn {
  border:2px solid #FFCBD9;
  padding:10px;
  border-radius:12px;
  color:#FFCBD9;
  background:#fff;
  cursor:pointer;
}

.taskBox {
  border:2px solid #FFCBD9;
  border-radius:16px;
  padding:12px;
  margin-top:12px;
}

.taskDate {
  font-weight:700;
  margin-bottom:6px;
}

.line {
  height:1px;
  background:#ccc;
  margin-bottom:8px;
}

/* 섹터 */
.sector {
  border:1px solid #FFCBD9;
  border-radius:12px;
  padding:8px;
  margin-top:8px;
}

.progressBar {
  width:100%;
  height:8px;
  border:1px solid #FFCBD9;
  border-radius:4px;
  margin-top:4px;
}

.progressFill {
  height:100%;
  width:0%;
  background:#FFCBD9;
}

.heart {
  cursor:pointer;
  color:#FFCBD9;
  font-size:18px;
}
</style>
</head>

<body>

<!-- DM -->
<div id="dmScreen" class="screen active">
  <div class="header">
    <div class="name">김현준</div>
    <div class="plus" id="goPlanner">＋</div>
  </div>

  <div id="chat"></div>

  <div class="inputArea">
    <input id="msgInput">
    <button class="sendBtn">전송</button>
  </div>
</div>

<!-- 플래너 -->
<div id="plannerScreen" class="screen">
  <div class="header">
    <div id="backBtn">&lt;</div>
    <div>플래너</div>
    <div></div>
  </div>

  <div id="plannerContent">
    <div id="dDay"></div>
    <button class="addTaskBtn">할 일 추가</button>
    <div id="taskContainer"></div>
  </div>
</div>

<script>

/* 화면 전환 */
const dmScreen = document.getElementById('dmScreen');
const plannerScreen = document.getElementById('plannerScreen');

document.getElementById('goPlanner').onclick = ()=>{
  dmScreen.classList.remove('active');
  plannerScreen.classList.add('active');
  updateDDay();
};

document.getElementById('backBtn').onclick = ()=>{
  plannerScreen.classList.remove('active');
  dmScreen.classList.add('active');
};

/* DDAY */
function updateDDay(){
  const target = new Date(2026,10,19);
  const now = new Date();
  const diff = Math.ceil((target-now)/(1000*60*60*24));
  document.getElementById('dDay').innerText = "D-" + diff;
}

/* ===== 채팅 ===== */
const chatEl = document.getElementById('chat');
const input = document.getElementById('msgInput');
const sendBtn = document.querySelector('.sendBtn');

let chatData = JSON.parse(localStorage.getItem('chat')||'[]');
let isTyping = false;

function renderChat(){
  chatEl.innerHTML='';
  let lastMeIndex = chatData.map(m=>m.type).lastIndexOf('me');

  chatData.forEach((m,i)=>{
    let row = document.createElement('div');
    row.className = 'row ' + m.type;

    let wrap = document.createElement('div');

    let bubble = document.createElement('div');
    bubble.className='bubble';
    bubble.innerText=m.text;

    wrap.appendChild(bubble);

    if(m.type==='me' && i===lastMeIndex){
      let nextAI = chatData.slice(i+1).find(x=>x.type==='ai');
      if(nextAI && !isTyping){
        let read = document.createElement('div');
        read.className='read';
        read.innerText='읽음';
        wrap.appendChild(read);
      }
    }

    row.appendChild(wrap);
    chatEl.appendChild(row);
  });

  if(isTyping){
    let row = document.createElement('div');
    row.className='row ai';
    let bubble = document.createElement('div');
    bubble.className='bubble';
    bubble.innerText='...';
    row.appendChild(bubble);
    chatEl.appendChild(row);
  }

  chatEl.scrollTop = chatEl.scrollHeight;
}

function save(msg,type){
  chatData.push({text:msg,type:type,time:Date.now()});
  localStorage.setItem('chat',JSON.stringify(chatData));
  renderChat();
}

function generateReply(){
  const arr=['ㅇㅇ','ㅋㅋ','왜','뭐임'];
  return arr[Math.floor(Math.random()*arr.length)];
}

function replyFlow(msg){
  setTimeout(()=>{
    isTyping=true;
    renderChat();

    setTimeout(()=>{
      isTyping=false;
      save(generateReply(msg),'ai');
    },5000);

  }, Math.random()*600000+60000);
}

function sendMsg(){
  let text=input.value.trim();
  if(!text) return;
  save(text,'me');
  input.value='';
  replyFlow(text);
}

sendBtn.onclick = sendMsg;

/* ===== 플래너 ===== */
const taskContainer = document.getElementById('taskContainer');
const addTaskBtn = document.querySelector('.addTaskBtn');

addTaskBtn.onclick = ()=>{
  const box = document.createElement('div');
  box.className='taskBox';

  const date = new Date().toLocaleDateString();

  box.innerHTML = `
    <div class="taskDate">${date}</div>
    <div class="line"></div>
    <button onclick="addSector(this)">+ 섹터 추가</button>
    <div class="sectorContainer"></div>
  `;

  taskContainer.appendChild(box);
};

function addSector(btn){
  const container = btn.nextElementSibling;
  const type = prompt('1: 영상 / 2: 개념 / 3: 문풀');

  const sec = document.createElement('div');
  sec.className='sector';

  /* 영상 */
  if(type==='1'){
    sec.innerHTML=`
      영상 시청<br>
      총: <input class="t">h <input class="t">m <input class="t">s<br>
      현재: <input class="c">h <input class="c">m <input class="c">s
      <div class="progressBar"><div class="progressFill"></div></div>
      <span class="heart">♡</span>
    `;

    const inputs = sec.querySelectorAll('input');
    const fill = sec.querySelector('.progressFill');

    inputs.forEach(i=>{
      i.oninput=()=>{
        let t = (inputs[0].value*3600||0)+(inputs[1].value*60||0)+(inputs[2].value||0);
        let c = (inputs[3].value*3600||0)+(inputs[4].value*60||0)+(inputs[5].value||0);
        if(t>0) fill.style.width=(c/t*100)+'%';
      };
    });

    sec.querySelector('.heart').onclick=()=>sec.querySelector('.heart').innerText='♥';
  }

  /* 개념 */
  if(type==='2'){
    sec.innerHTML=`개념 정리 <input type="checkbox">`;
  }

  /* 문풀 (디테일 완성) */
  if(type==='3'){
    sec.innerHTML=`
      문풀<br>
      <input class="total" placeholder="총량 (예: 30)">
      <input class="done" placeholder="현재 푼 수">
      <div class="progressBar"><div class="progressFill"></div></div>
      <span class="heart">♡</span>
    `;

    const total = sec.querySelector('.total');
    const done = sec.querySelector('.done');
    const fill = sec.querySelector('.progressFill');

    function update(){
      let t = parseInt(total.value)||0;
      let d = parseInt(done.value)||0;
      if(t>0) fill.style.width=(d/t*100)+'%';
    }

    total.oninput = update;
    done.oninput = update;

    sec.querySelector('.heart').onclick=()=>sec.querySelector('.heart').innerText='♥';
  }

  container.appendChild(sec);
}

/* 시작 */
renderChat();

</script>

</body>
</html>
