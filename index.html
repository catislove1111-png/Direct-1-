<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>(1) Instagram</title>
<style>
  body { margin:0; font-family:-apple-system; background:#fff; }
  .header {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 16px; border-bottom:1px solid #eee; background:#fff;
  }
  .header .name { font-weight:600; font-size:16px; color:#333; }
  .header .add-today { font-weight:700; font-size:18px; color:#FFCBD9; cursor:pointer; }
  
  .chat { padding:10px; display:flex; flex-direction:column; }

  .daily-task-box {
    background:#fff; border:2px solid #FFCBD9; border-radius:16px; padding:12px;
    margin:10px 0; position:relative;
  }
  .daily-date { color:#FFCBD9; font-size:20px; font-weight:700; margin-bottom:8px; }
  .add-sector-btn { font-weight:700; font-size:18px; color:#FFCBD9; border:none; background:none; cursor:pointer; }
  
  .sectors-container { margin-top:8px; }

  .sector-box {
    border-radius:12px; border:1px solid #FFCBD9; padding:8px; margin-top:10px; position:relative;
    background:#fff;
  }
  .sector-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .sector-title { font-weight:700; font-size:16px; }
  .remove-sector { cursor:pointer; border:none; background:none; font-weight:700; color:#FFCBD9; }

  .sector-content input[type="number"], .sector-content input[type="text"] {
    width:50px; padding:4px; margin-right:4px; border:1px solid #ccc; border-radius:4px;
  }

  .sector-divider { border:none; height:1px; background:#FFCBD9; margin-top:6px; }

  .progress-bar {
    width:100%; height:8px; border:1px solid #FFCBD9; border-radius:4px; background:#fff; margin-top:4px;
    position:relative;
  }
  .progress-fill {
    height:100%; background:#FFCBD9; border-radius:4px 0 0 4px; width:0%;
  }
  .heart-btn { cursor:pointer; font-size:18px; color:#FFCBD9; font-weight:700; margin-left:8px; }
</style>
</head>
<body>

<div class="header">
  <div class="name">김현준</div>
  <div class="add-today" id="addTodayBtn">+</div>
</div>

<div class="chat" id="chat"></div>

<script>
const chat = document.getElementById('chat');
const addTodayBtn = document.getElementById('addTodayBtn');
const todayStr = new Date().toISOString().split('T')[0]; // yyyy-mm-dd
const DDAY = new Date('2026-11-19');

function daysUntil(target){
  const diff = target - new Date();
  return Math.ceil(diff / (1000*60*60*24));
}

// 체크 저장용
let tasksData = JSON.parse(localStorage.getItem('tasksData') || '{}');

function saveData(){
  localStorage.setItem('tasksData', JSON.stringify(tasksData));
}

function renderDailyTask(){
  chat.innerHTML = '';
  if(!tasksData[todayStr]){
    addTodayBtn.disabled = false;
  } else {
    addTodayBtn.disabled = true;
    const box = createDailyTaskBox(todayStr);
    chat.appendChild(box);
  }
}

function createDailyTaskBox(date){
  const box = document.createElement('div');
  box.className = 'daily-task-box';
  const dateDiv = document.createElement('div');
  dateDiv.className = 'daily-date';
  const ddayCount = daysUntil(DDAY);
  dateDiv.innerText = `${date} · D-${ddayCount}`;
  box.appendChild(dateDiv);

  const addSectorBtn = document.createElement('button');
  addSectorBtn.className = 'add-sector-btn';
  addSectorBtn.innerText = '+';
  box.appendChild(addSectorBtn);

  const sectorsContainer = document.createElement('div');
  sectorsContainer.className = 'sectors-container';
  box.appendChild(sectorsContainer);

  // 섹터 추가
  addSectorBtn.addEventListener('click', ()=>{
    const type = prompt('섹터 선택: video, concept, problem');
    if(!type) return;
    const sectorBox = createSectorBox(type);
    sectorsContainer.appendChild(sectorBox);
    if(!tasksData[date]) tasksData[date] = [];
    tasksData[date].push({type, data:{}});
    saveData();
  });

  return box;
}

function createSectorBox(type){
  const box = document.createElement('div');
  box.className = 'sector-box';

  const header = document.createElement('div');
  header.className = 'sector-header';

  const title = document.createElement('div');
  title.className = 'sector-title';
  title.innerText = type==='video' ? '영상 시청' : type==='concept' ? '개념 정리' : '문풀';

  const removeBtn = document.createElement('button');
  removeBtn.className = 'remove-sector';
  removeBtn.innerText = 'x';
  removeBtn.addEventListener('click', ()=>box.remove());

  header.appendChild(title);
  header.appendChild(removeBtn);
  box.appendChild(header);

  const content = document.createElement('div');
  content.className = 'sector-content';
  if(type==='video'){
    content.innerHTML = `
      <label>총 영상 길이:</label>
      <input type="number" min="0" placeholder="시간">시간
      <input type="number" min="0" placeholder="분">분
      <input type="number" min="0" placeholder="초">초
      <br>
      <label>현재 시청:</label>
      <input type="number" min="0" placeholder="시간">시간
      <input type="number" min="0" placeholder="분">분
      <input type="number" min="0" placeholder="초">초
      <div class="progress-bar"><div class="progress-fill"></div></div>
      <span class="heart-btn">♡</span>
    `;
    const heart = content.querySelector('.heart-btn');
    const progress = content.querySelector('.progress-fill');
    heart.addEventListener('click', ()=>{
      progress.style.width = '100%';
      heart.innerText = '♥';
    });
  }
  if(type==='concept'){
    content.innerHTML = `
      <label>개념 정리 완료</label>
      <input type="checkbox">
      <hr class="sector-divider">
    `;
  }
  if(type==='problem'){
    content.innerHTML = `
      <label>문제집 이름:</label>
      <input type="text" placeholder="책 이름">
      <br>
      <label>페이지수(n1~n2) 또는 문제수(n):</label>
      <input type="text" placeholder="예: 1~20p 또는 30문항">
      <div class="progress-bar"><div class="progress-fill"></div></div>
      <span class="heart-btn">♡</span>
    `;
    const heart = content.querySelector('.heart-btn');
    const progress = content.querySelector('.progress-fill');
    heart.addEventListener('click', ()=>{
      progress.style.width = '100%';
      heart.innerText = '♥';
    });
  }

  box.appendChild(content);
  const hr = document.createElement('hr');
  hr.className = 'sector-divider';
  box.appendChild(hr);

  return box;
}

// 오늘 할 일 추가
addTodayBtn.addEventListener('click', ()=>{
  tasksData[todayStr] = [];
  saveData();
  renderDailyTask();
});

renderDailyTask();
</script>
</body>
</html>
