<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram(1)</title>
<style>
body { margin:0; font-family:-apple-system; background:#fff; }
.header {
  display:flex; align-items:center;
  padding:10px; border-bottom:1px solid #eee;
}
.header img { width:36px; height:36px; border-radius:50%; margin-right:10px; }
.name { font-weight:600; font-size:15px; }
.sub { font-size:12px; color:#888; }

#taskArea { padding:10px; border-bottom:1px solid #eee; }
.chat { padding:10px; margin-bottom:70px; display:flex; flex-direction:column; }

.row { display:flex; align-items:flex-end; margin:6px 0; }
.msg { max-width:65%; padding:10px 14px; border-radius:18px; font-size:14px; }
.me { margin-left:auto; background:linear-gradient(135deg,#5B9CFF,#7B5CFF); color:white; }
.ai { background:#f1f1f1; }
.pfp { width:26px; height:26px; border-radius:50%; margin-right:6px; }

.read { font-size:11px; color:#999; margin:2px 10px; text-align:right; }

.inputArea {
  position:fixed; bottom:0; width:100%; display:flex; padding:8px;
  border-top:1px solid #eee; background:white;
}
input#msgInput {
  flex:1; padding:10px; border-radius:20px; border:1px solid #ddd;
}
button, .sendBtn {
  margin-left:6px; cursor:pointer; border:none; border-radius:20px;
  background:#5B9CFF; color:white; width:48px; height:48px; object-fit:contain;
}
</style>
</head>
<body>

<div class="header">
  <img src="pfp.jpg">
  <div>
    <div class="name">김현준</div>
    <div class="sub">오늘 활동 중</div>
  </div>
</div>

<!-- 오늘 할 일 플래너 -->
<div id="taskArea"></div>
<div style="padding:10px;">
  <input id="newTask" placeholder="오늘 할 일 추가">
  <button onclick="addTaskFromInput()">+</button>
</div>

<div id="chat" class="chat"></div>

<div class="inputArea">
  <input id="msgInput" placeholder="메시지 보내기...">
  <img src="send.png" class="sendBtn" onclick="sendMsg()">
</div>

<script>
let chat = document.getElementById("chat");
let tasks = [];
let sentMsgs = new Set();
let studyMsgs = [
  "넌 공부 안하냐", "공부좀해", "너 공부안하면 연락안함", "ㅗ", "연락 ㄴ",
  "왜 아직 다 안햇냐", "좀 공부쫌 하자", "공부해서 나 먹여살린다매 왜 안하냐",
  "얼른 시작해", "또 미루냐", "뭐하냐 지금", "ㅈㅂ공부쫌해라;",
  "왜 손 놓고 있어", "할 거 다 해야지", "너는 대학 갈 생각 없냐", "좀 집중해",
  "아직 안 끝났냐", "대체 뭐하냐", "쫌 제대로 해", "빨리 하자" "나한테 이러느랴고 공부 ㅈ도 안한거 개웃기네"
];

// 오늘 할 일 기능
function addTask(text){
  if(!text.trim()) return;
  tasks.push({text:text.trim(), done:false});
  renderTasks();
}
function addTaskFromInput(){
  let input = document.getElementById("newTask");
  addTask(input.value);
  input.value="";
}
function toggleTask(i){
  tasks[i].done = !tasks[i].done;
  renderTasks();
}
function renderTasks(){
  const taskArea = document.getElementById("taskArea");
  taskArea.innerHTML="";
  tasks.forEach((t,i)=>{
    const row = document.createElement("div");
    row.style.display="flex";
    row.style.alignItems="center";
    row.style.margin="4px 0";

    const cb = document.createElement("input");
    cb.type="checkbox"; cb.checked=t.done;
    cb.onchange=()=>toggleTask(i);

    const span = document.createElement("span");
    span.innerText = t.text; span.style.marginLeft="8px";

    row.appendChild(cb); row.appendChild(span);
    taskArea.appendChild(row);
  });
}

// 채팅 로드
function timeAgo(ts){
  let diff = Math.floor((Date.now()-ts)/60000);
  if(diff<1) return "방금 전";
  if(diff<60) return diff+"분 전";
  let h=Math.floor(diff/60);
  return h+"시간 전";
}
function load(){
  let data = JSON.parse(localStorage.getItem("chat")||"[]");
  chat.innerHTML="";
  let lastMeIndex = [...data].map(m=>m.type).lastIndexOf("me");

  data.forEach((m,i)=>{
    let row=document.createElement("div");
    row.className="row";
    if(m.type==="ai"){
      let img=document.createElement("img");
      img.src="pfp.jpg";
      img.className="pfp";
      row.appendChild(img);
    }
    let msg=document.createElement("div");
    msg.className="msg "+m.type;
    msg.innerText=m.text;
    row.appendChild(msg); chat.appendChild(row);

    if(i === lastMeIndex){
      let r=document.createElement("div");
      r.className="read";
      r.innerText="읽음 · "+timeAgo(m.time);
      chat.appendChild(r);
    }
  });
  chat.scrollTop=chat.scrollHeight;
}

// 메시지 보내기
function sendMsg(){
  let input = document.getElementById("msgInput");
  let text = input.value.trim();
  if(!text) return;
  save(text,"me");
  input.value="";

  // 사용자가 입력 중이면 AI 답장 지연
  setTimeout(()=>{
    if(document.getElementById("msgInput").value.trim()==="") aiReply(text);
  },1500);
}
function save(text,type){
  let data = JSON.parse(localStorage.getItem("chat")||"[]");
  data.push({text,type,time:Date.now()});
  localStorage.setItem("chat",JSON.stringify(data));
  load();
}


// 공부 압박
function studyPressure(){
  const undone = tasks.filter(t=>!t.done).length;
  if(tasks.length>0 && undone/tasks.length >0.5){
    let available = studyMsgs.filter(m=>!sentMsgs.has(m));
    if(available.length===0) sentMsgs.clear();
    let msg = available[Math.floor(Math.random()*available.length)];
    sentMsgs.add(msg); save(msg,"ai");
  }
}

// 랜덤 시간마다 압박 전송
setInterval(studyPressure, 1000*60*(3+Math.random()*7));

// 초기 로드
document.addEventListener("DOMContentLoaded",()=>{
  load();
});
</script>

</body>
</html>
