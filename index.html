<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>♡</title>

<style>
body { margin:0; font-family:-apple-system; background:#fff; }

.header {
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 16px; border-bottom:1px solid #FFCBD9;
}
.name { font-weight:600; }
.add-btn { font-size:22px; color:#FFCBD9; cursor:pointer; }

#container { display:flex; flex-direction:column; height:calc(100vh - 52px); }

#chat { flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; }
.row { display:flex; margin:6px 0; }

.msg {
  max-width:65%;
  padding:10px 14px;
  border-radius:18px;
  font-size:14px;
}

.me { margin-left:auto; background:linear-gradient(135deg,#FFCBD9,#FF97B3); color:white; }
.ai { margin-right:auto; background:#f1f1f1; }

.read { font-size:11px; color:#999; margin-top:2px; }

.inputArea { display:flex; padding:8px; border-top:1px solid #eee; }
.inputArea input { flex:1; padding:10px; border-radius:20px; border:1px solid #ddd; }
.sendBtn { margin-left:6px; border:none; border-radius:20px; background:#FFCBD9; color:white; padding:0 12px; }

#plannerScreen { display:none; padding:20px; }
.taskBox { border:2px solid #FFCBD9; border-radius:14px; padding:12px; margin-top:12px; }

.sector { border:1px solid #FFCBD9; border-radius:10px; padding:8px; margin-top:8px; }
.progress { height:6px; border:1px solid #FFCBD9; border-radius:4px; margin-top:4px; }
.fill { height:100%; background:#FFCBD9; width:0%; }
</style>
</head>

<body>

<div id="dmScreen">
  <div class="header">
    <div class="name">김현준</div>
    <div class="add-btn" id="goPlanner">＋</div>
  </div>

  <div id="container">
    <div id="chat"></div>
  </div>

  <div class="inputArea">
    <input id="msgInput">
    <button class="sendBtn" id="sendBtn">전송</button>
  </div>
</div>

<div id="plannerScreen">
  <div id="backBtn">←</div>
  <h1 id="dDay"></h1>
  <div id="today"></div>
  <button id="addTaskBtn">할 일 추가</button>
  <div id="taskContainer"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", ()=>{

const dm = document.getElementById('dmScreen');
const planner = document.getElementById('plannerScreen');
const chatEl = document.getElementById('chat');
const input = document.getElementById('msgInput');

let chat = JSON.parse(localStorage.getItem('chat')||'[]');
let isTyping=false;

// 화면 전환
goPlanner.onclick=()=>{
 dm.style.display='none';
 planner.style.display='block';
 const t=new Date(2026,10,19);
 const n=new Date();
 dDay.innerText='D-'+Math.ceil((t-n)/(86400000));
 today.innerText=n.toLocaleDateString('ko-KR');
};
backBtn.onclick=()=>{planner.style.display='none';dm.style.display='block';};

// 채팅 렌더
function render(){
 chatEl.innerHTML='';
 let lastMe=chat.map(m=>m.type).lastIndexOf('me');

 chat.forEach((m,i)=>{
  let row=document.createElement('div'); row.className='row';
  let wrap=document.createElement('div');
  wrap.style.display='flex'; wrap.style.flexDirection='column';
  wrap.style.alignItems=m.type==='me'?'flex-end':'flex-start';

  let msg=document.createElement('div');
  msg.className='msg '+m.type;
  msg.innerText=m.text;
  wrap.appendChild(msg);

  if(m.type==='me' && i===lastMe && !isTyping){
   let next=chat.slice(i+1).find(x=>x.type==='ai');
   if(next){
    let r=document.createElement('div');
    let d=next.time-m.time;
    if(d<10000) r.innerText='방금 전 읽음';
    else if(d<3600000) r.innerText=Math.floor(d/60000)+'분 전 읽음';
    else r.innerText=Math.floor(d/3600000)+'시간 전 읽음';
    r.className='read';
    wrap.appendChild(r);
   }
  }

  row.appendChild(wrap);
  chatEl.appendChild(row);
 });

 if(isTyping){
  let r=document.createElement('div'); r.className='row';
  let m=document.createElement('div'); m.className='msg ai'; m.innerText='...';
  r.appendChild(m); chatEl.appendChild(r);
 }

 chatEl.scrollTop=chatEl.scrollHeight;
}

function save(t,type){
 chat.push({text:t,type,time:Date.now()});
 localStorage.setItem('chat',JSON.stringify(chat));
 render();
}

// 답장
function reply(msg){
 const arr=['ㅇㅇ','왜','ㅋㅋ','ㄴ'];
 save(arr[Math.floor(Math.random()*arr.length)],'ai');
}

function replyDelay(msg){
 let d=Math.random()*5000+1000;
 isTyping=true; render();
 setTimeout(()=>{isTyping=false; save(reply(msg),'ai');},d);
}

// 전송
sendBtn.onclick=()=>{
 let t=input.value.trim();
 if(!t) return;
 save(t,'me'); input.value='';
 replyDelay(t);
};

// 독촉
function nag(){
 const m=['공부좀','연락 ㄴ','뭐함','공부해'];
 save(m[Math.floor(Math.random()*m.length)],'ai');
 setTimeout(nag,3600000+Math.random()*3600000);
}
nag();

// 플래너
addTaskBtn.onclick=()=>{
 let box=document.createElement('div'); box.className='taskBox';
 box.innerText=new Date().toLocaleDateString('ko-KR');

 let btns=['영상 시청','개념 정리','문풀'];
 btns.forEach(t=>{
  let b=document.createElement('button');
  b.innerText=t;
  b.onclick=()=>{
   let sec=document.createElement('div'); sec.className='sector';
   sec.innerText=t;

   if(t==='영상 시청'||t==='문풀'){
    let bar=document.createElement('div'); bar.className='progress';
    let fill=document.createElement('div'); fill.className='fill';
    bar.appendChild(fill);
    sec.appendChild(bar);
   }

   box.appendChild(sec);
  };
  box.appendChild(b);
 });

 taskContainer.appendChild(box);
};

render();

});
</script>

</body>
</html>
